<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YonoAppsKiDuniya</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

<div class="header-box">

<div class="logo-box">

<img src="images/logo.png" class="logo" alt="YonoAppsKiDuniya Logo">

<div class="title-box">

<h1>YonoAppsKiDuniya</h1>

<p>India's Trusted Gaming Store</p>

</div>

</div>

</div>

</header>
<!-- ================= SEARCH ================= -->

<div class="search-wrapper">

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Search Your Favourite Game..."
        >

    </div>

</div>



<!-- ================= BANNER SLIDER ================= -->

<div class="slider">

    <div class="slide active">
        <img src="images/banner1.png" alt="Banner 1">
    </div>

    <div class="slide">
        <img src="images/banner2.png" alt="Banner 2">
    </div>

    <div class="slide">
        <img src="images/banner3.png" alt="Banner 3">
    </div>

</div>



<!-- ================= TELEGRAM ================= -->

<div class="telegram-wrapper">

    <a
        href="https://t.me/lordearningtip"
        target="_blank"
        class="telegram-btn">

        📢 JOIN TELEGRAM CHANNEL

    </a>

</div>
<!-- ================= TOP GAMES ================= -->

<section class="games-section">

    <div class="section-header">

        <h2>
            🔥 TOP EARNING GAMES
        </h2>

        <p id="gameCount">
            Loading Games...
        </p>

    </div>


    <!-- ================= FIREBASE GAMES ================= -->

    <div
        id="gamesContainer"
        class="games-list">

        <!--
        Firebase se saare games yahin automatically load honge.
        Yahan manually koi game-card paste nahi karna.
        -->

    </div>

</section>
